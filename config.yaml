# GamWatch Configuration

# LLM Provider Settings
llm:
  provider: "claude"          # claude / openai / gemini / onpremise
  model: "claude-haiku-4-5-20251001"
  max_tokens: 16384

# Google Sheets
sheets:
  spreadsheet_id: "1IG3GWc4kChVmjYxsPw_NX3gUlKj_ehOFgOMh3RqJPRY"

# YouTube Channels - 국회방송
youtube:
  channels:
    - id: ""                  # 국회방송 채널 ID (OQ2: 확인 필요)
      name: "국회방송"

# Target Committees (상임위)
