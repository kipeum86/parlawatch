    name: "정무위원회"
    search_terms: ["정무위", "정무위원회"]
  - code: "gwabang"
    name: "과학기술정보방송통신위원회"
    search_terms: ["과방위", "과학기술정보방송통신위원회"]
  - code: "munche"
